services:
  postgres:
    image: postgres:16-alpine
    container_name: smi_postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=YourStrong@Passw0rd
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init/00_init_multiple_dbs.sh:/docker-entrypoint-initdb.d/00_init.sh
      - ./database:/database
    networks:
      - smi_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d SMI_DSS"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: smi_backend
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=YourStrong@Passw0rd
      - DB_NAME=SMI_DSS
      - DB_SCHEMA_NDS=nds
      - DB_SCHEMA_DDS=dds
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - ENVIRONMENT=production
      - DEFAULT_SOLVER=cbc
      - SOLVER_TIME_LIMIT=300
      - MIP_GAP=0.01
      - LOG_LEVEL=INFO
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./optimization:/app/optimization
      - ./shared:/app/shared
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smi_network
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
    container_name: smi_frontend_react
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - smi_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:

networks:
  smi_network:
    driver: bridge
