services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: smi_backend
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - ENVIRONMENT=production
      - DEFAULT_SOLVER=cbc
      - SOLVER_TIME_LIMIT=300
      - MIP_GAP=0.01
      - LOG_LEVEL=INFO
      - DATA_DIR=/app/data
      - SQLITE_DB_PATH=/app/data/nds.db
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./optimization:/app/optimization
      - ./shared:/app/shared
      - ./data:/app/data
      - ./data_test:/app/data_test
    networks:
      - smi_network
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
    container_name: smi_frontend_react
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - smi_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:80"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  smi_network:
    driver: bridge
